name: Run Split Mode Tests
on:
  workflow_dispatch:
  push:
    branches:
      - master
jobs:
  test-linux:
    if: github.repository == 'JetBrains/ideavim'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "Disk space after cleanup:"
          df -h
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
      - name: Run split mode tests
        run: gradle :tests:split-mode-tests:testSplitMode --console=plain
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: split-mode-reports
          path: |
            tests/split-mode-tests/build/reports
            out/ide-tests/tests/**/log
            out/ide-tests/tests/**/frontend/log
